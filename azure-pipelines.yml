name: Scheduled Thursday Pipeline

on:
  schedule:
    - cron: '0 18 * * 4'
    - cron: '0 19 * * 4'
    - cron: '0 20 * * 4'
    - cron: '0 21 * * 4'
    - cron: '0 22 * * 4'
    - cron: '0 23 * * 4'

jobs:
  example-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run scheduled task
        run: |
          echo "Running scheduled pipeline on Thursday at $(date) UTC"
          echo "This is an example job triggered by cron schedule."