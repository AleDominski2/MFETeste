trigger: none

schedules:
- cron: '*/3 * * * *'
  displayName: 'Run every 3 minutes'
  branches:
    include:
    - '*'
  always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
- name: maxExecutions
  value: '3'

jobs:
- job: LimitExecutions
  steps:
  - pwsh: |
      $uri = "$env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI$env:SYSTEM_TEAMPROJECT/_apis/build/builds?definitions=$env:SYSTEM_DEFINITIONID&`$top=50&api-version=7.1-preview.7"
      $headers = @{Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN"}
      try {
        $response = Invoke-RestMethod -Uri $uri -Headers $headers -Method Get
        $completed = $response.value | Where-Object { $_.status -eq 'completed' -and $_.result -eq 'succeeded' }
        $count = $completed.Count
        Write-Host "Previous successful executions: $count"
        if ($count -ge [int]$env:MAXEXECUTIONS) {
          Write-Host 'Max executions reached. Skipping tests.'
          Write-Host "##vso[task.setvariable variable=RunTests]false"
        } else {
          Write-Host 'Proceeding with tests.'
          Write-Host "##vso[task.setvariable variable=RunTests]true"
        }
      } catch {
        Write-Host "Error fetching builds: $_"
        Write-Host "##vso[task.setvariable variable=RunTests]false"
      }
    displayName: 'Check previous executions'
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      MAXEXECUTIONS: $(maxExecutions)
  - script: |
      echo "Running test execution #$((($env:MAXEXECUTIONS - $env:RunTests + 1)) ) wait no, simple test."
      echo "This is a demo test step."
    displayName: 'Run Tests'
    condition: eq(variables.RunTests, 'true')
